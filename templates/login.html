
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>沅興木業｜登入</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
  <meta name="theme-color" content="#f4f1ea">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">木</div>
      <h1>沅興木業</h1>
      <p>AI OCR 智慧倉庫系統</p>
      {% if error %}<div class="note-box red">{{ error }}</div>{% endif %}
      <div class="login-form">
        <div>
          <div class="label">帳號</div>
          <input class="input" id="username" placeholder="員工姓名" autocomplete="username">
        </div>
        <div>
          <div class="label">密碼</div>
          <input class="input" id="password" type="password" placeholder="第一次輸入密碼" autocomplete="current-password">
        </div>
        <div class="grid2">
          <label class="small-pill"><input id="remember" type="checkbox" checked> 記住登入</label>
          <label class="small-pill"><input id="saveCreds" type="checkbox"> 記住帳密（本機）</label>
        </div>
        <button class="big-btn" onclick="App.login()">登入系統</button>
        <div class="helper">登入後可直接使用庫存、訂單、總單、出貨、出貨查詢、倉庫圖、客戶資料。</div>
      </div>
    </div>
  </div>

<script>
window.APP_CONFIG = {};
</script>
<script src="/static/app.js?v=9"></script>
<script>
document.addEventListener('DOMContentLoaded', () => App.initLogin());
</script>
</body>
</html>
