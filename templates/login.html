<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登入系統</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="eyebrow">員工制 / 永久登入</div>
    <h1>倉庫系統登入</h1>

    <label>帳號（員工姓名）</label>
    <input type="text" id="name" placeholder="請輸入員工姓名">

    <label>密碼（第一次輸入數字）</label>
    <input type="password" id="password" placeholder="請輸入密碼">

    <button class="primary-btn full" id="loginBtn">登入</button>

    <div class="login-meta" id="loading"></div>
    <div class="login-error" id="msg"></div>
  </div>

<script>
let submitting = false;

async function autoLogin(name, password){
  try{
    const res = await fetch("/api/login", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username: name, password })
    });
    const data = await res.json();
    if(data.success){
      window.location.href = "/";
      return true;
    }
    return false;
  }catch(e){
    return false;
  }
}

window.addEventListener("load", async () => {
  const savedName = localStorage.getItem("username") || "";
  const savedPass = localStorage.getItem("password") || "";

  if(savedName) document.getElementById("name").value = savedName;
  if(savedPass) document.getElementById("password").value = savedPass;

  if(savedName && savedPass){
    document.getElementById("loading").innerText = "自動登入中...";
    await autoLogin(savedName, savedPass);
    document.getElementById("loading").innerText = "";
  }
});

async function login(){
  if(submitting) return;
  submitting = true;

  const name = document.getElementById("name").value.trim();
  const password = document.getElementById("password").value.trim();

  document.getElementById("msg").innerText = "";
  document.getElementById("loading").innerText = "登入中...";

  if(!name || !password){
    document.getElementById("loading").innerText = "";
    document.getElementById("msg").innerText = "請輸入帳號與密碼";
    submitting = false;
    return;
  }

  try{
    const res = await fetch("/api/login", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username: name, password })
    });

    const data = await res.json();
    document.getElementById("loading").innerText = "";

    if(data.success){
      localStorage.setItem("username", name);
      localStorage.setItem("password", password);
      window.location.href = "/";
      return;
    }

    document.getElementById("msg").innerText = data.error || "登入失敗";
  }catch(e){
    document.getElementById("loading").innerText = "";
    document.getElementById("msg").innerText = "網路錯誤";
  }

  submitting = false;
}

document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("password").addEventListener("keydown", (e) => {
  if(e.key === "Enter") login();
});
</script>
</body>
</html>
