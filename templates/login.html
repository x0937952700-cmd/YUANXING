{% extends 'base.html' %}
{% set title = '沅興木業｜登入' %}
{% block body %}
<main class="auth-shell">
  <section class="auth-card glass">
    <div class="brand-mark">沅興木業</div>
    <h1>員工登入</h1>
    <p class="muted">手機可直接登入，支援永久登入與自動回填。</p>

    <div class="form-stack">
      <label>帳號</label>
      <input id="login-username" type="text" placeholder="請輸入員工姓名" autocomplete="username" />

      <label>密碼</label>
      <input id="login-password" type="password" placeholder="請輸入密碼" autocomplete="current-password" />

      <label class="check-row"><input id="remember-me" type="checkbox" checked /> 記住登入狀態</label>

      <button class="primary-btn" id="login-btn">登入系統</button>
      <div class="msg" id="login-msg"></div>
    </div>
  </section>
</main>
{% endblock %}
