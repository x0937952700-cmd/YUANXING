<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>沅興木業</title>

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial;
    text-align:center;
}

.title{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.menu-btn{
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:18px;
    border-radius:12px;
}

/* 倉庫 */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:10px;
}

.cell{
  height:90px;
  border-radius:10px;
  padding:5px;
  position:relative;
}

.used{background:#a5d6a7;}
.empty{background:#eee;}

.loc{
  font-size:12px;
  position:absolute;
  top:3px;
  left:5px;
}
</style>
</head>

<body>

<div class="title">沅興木業</div>

<!-- 七大功能 -->
<button class="menu-btn" onclick="renderInventory()">庫存</button>
<button class="menu-btn" onclick="renderOrder()">訂單</button>
<button class="menu-btn" onclick="renderShip()">出貨</button>
<button class="menu-btn" onclick="renderShipQuery()">出貨查詢</button>
<button class="menu-btn" onclick="renderWarehouse()">倉庫圖</button>
<button class="menu-btn" onclick="renderCustomers()">客戶資料</button>
<button class="menu-btn" onclick="renderActivity()">異動資料</button>

<hr>
<div id="app"></div>

<script>

// ===== toast =====
function toast(msg){
  const t=document.createElement('div')
  t.innerText=msg
  t.style="position:fixed;top:20px;right:20px;background:#333;color:#fff;padding:10px;border-radius:8px;"
  document.body.appendChild(t)
  setTimeout(()=>t.remove(),2000)
}

// ===== 庫存 =====
async function renderInventory(){
  const r=await fetch('/api/inventory')
  const j=await r.json()

  app.innerHTML="<h3>庫存</h3>"+
    j.items.map(x=>`<div>${x.p} - ${x.q}</div>`).join("")
}

// ===== 訂單 =====
function renderOrder(){
  app.innerHTML=`
  <h3>訂單</h3>
  產品<input id="p"><br>
  數量<input id="q"><br>
  <button onclick="order()">送出</button>`
}

async function order(){
  const p=document.getElementById("p").value
  const q=parseInt(document.getElementById("q").value)

  const r=await fetch('/api/order',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({p,q})
  })

  const j=await r.json()
  toast(j.ok?'成功':j.error)
}

// ===== 出貨 =====
function renderShip(){
  app.innerHTML=`
  <h3>出貨</h3>
  產品<input id="sp"><br>
  數量<input id="sq"><br>
  <button onclick="ship()">出貨</button>`
}

async function ship(){
  const p=sp.value
  const q=parseInt(sq.value)

  const r=await fetch('/api/ship',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({p,q})
  })

  const j=await r.json()
  toast(j.ok?'成功':j.error)
}

// ===== 出貨查詢 =====
async function renderShipQuery(){
  const r=await fetch('/api/orders')
  const j=await r.json()

  app.innerHTML="<h3>出貨查詢</h3>"+
    j.items.map(x=>`<div>${x.product} - ${x.qty}</div>`).join("")
}

// ===== 倉庫 =====
let dragItem=null

async function renderWarehouse(){
  const r=await fetch('/api/w')
  const d=await r.json()

  const map={}
  d.forEach(i=>map[i[2]]=i[0])

  let html='<div class="grid">'
  for(let i=1;i<=30;i++){
    const loc="A-"+i
    const p=map[loc]||""

    html+=`
    <div class="cell ${p?'used':'empty'}"
         ondragover="event.preventDefault()"
         ondrop="drop('${loc}')">
      <div class="loc">${loc}</div>
      <div draggable="true" ondragstart="drag('${p}')">${p}</div>
    </div>`
  }

  html+='</div>'
  app.innerHTML=html
}

function drag(p){dragItem=p}

async function drop(loc){
  if(!dragItem)return

  await fetch('/api/move',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({p:dragItem,l:loc})
  })

  toast("已移動")
  dragItem=null
  renderWarehouse()
}

// ===== 客戶 =====
async function renderCustomers(){
  const r=await fetch('/api/customers')
  const j=await r.json()

  app.innerHTML="<h3>客戶資料</h3>"+
    j.items.map(x=>`<div>${x.name}</div>`).join("")
}

// ===== 異動 =====
async function renderActivity(){
  const r=await fetch('/api/activity')
  const j=await r.json()

  app.innerHTML="<h3>異動資料</h3>"+
    j.items.map(x=>`<div>👤${x.user}｜${x.action}</div>`).join("")
}

// ===== 即時更新 =====
setInterval(()=>{
  renderInventory()
},5000)

</script>

</body>
</html>
