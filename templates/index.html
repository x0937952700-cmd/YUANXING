<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>沅興木業 FINAL</title>

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial;
    text-align:center;
}

.title{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.menu-btn{
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:18px;
    border-radius:10px;
}

/* 倉庫 */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:10px;
}

.cell{
  height:90px;
  border-radius:10px;
  padding:5px;
  position:relative;
}

.used{background:#a5d6a7;}
.empty{background:#eee;}

.loc{
  font-size:12px;
  position:absolute;
  top:3px;
  left:5px;
}

.item{
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="title">沅興木業 FINAL</div>

<!-- 七大功能 -->
<button class="menu-btn" onclick="renderOCR()">📸 OCR</button>
<button class="menu-btn" onclick="renderInventory()">庫存</button>
<button class="menu-btn" onclick="renderOrder()">訂單</button>
<button class="menu-btn" onclick="renderMaster()">總單</button>
<button class="menu-btn" onclick="renderShip()">出貨</button>
<button class="menu-btn" onclick="renderWarehouse()">倉庫</button>
<button class="menu-btn" onclick="renderActivity()">異動</button>

<hr>

<div id="app"></div>

<script>

// ===== OCR =====
function renderOCR(){
  document.getElementById("app").innerHTML = `
  <h3>OCR 上傳</h3>
  <input type="file" id="f">
  <button onclick="upload()">辨識</button>
  <pre id="r"></pre>`
}

async function upload(){
  const f=document.getElementById("f").files[0]
  const fd=new FormData()
  fd.append("file",f)

  const r=await fetch('/api/upload_ocr',{method:'POST',body:fd})
  const j=await r.json()

  document.getElementById("r").textContent=j.text
}

// ===== 庫存 =====
async function renderInventory(){
  const r=await fetch('/api/inventory')
  const j=await r.json()

  document.getElementById("app").innerHTML =
    "<h3>庫存</h3>" +
    j.items.map(x=>`<div>${x.p} - ${x.q}</div>`).join("")
}

// ===== 訂單 =====
function renderOrder(){
  document.getElementById("app").innerHTML = `
  <h3>訂單</h3>
  產品<input id="p"><br>
  數量<input id="q"><br>
  <button onclick="order()">送出</button>`
}

async function order(){
  const p=document.getElementById("p").value
  const q=parseInt(document.getElementById("q").value)

  const r=await fetch('/api/order',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({p,q})
  })

  const j=await r.json()
  alert(j.ok?'成功':j.error)
}

// ===== 總單 =====
async function renderMaster(){
  const r=await fetch('/api/orders')
  const j=await r.json()

  document.getElementById("app").innerHTML =
    "<h3>總單</h3>" +
    (j.items||[]).map(x=>`<div>${x.product} ${x.qty}</div>`).join("")
}

// ===== 出貨 =====
function renderShip(){
  document.getElementById("app").innerHTML = `
  <h3>出貨</h3>
  產品<input id="sp"><br>
  數量<input id="sq"><br>
  <button onclick="ship()">出貨</button>`
}

async function ship(){
  const p=document.getElementById("sp").value
  const q=parseInt(document.getElementById("sq").value)

  const r=await fetch('/api/ship',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({p,q})
  })

  const j=await r.json()
  alert(j.ok?'成功':j.error)
}

// ===== 倉庫拖拉 =====
let draggingProduct = null

async function renderWarehouse(){

  const r = await fetch('/api/w')
  const data = await r.json()

  const map = {}
  data.forEach(i=>{
    map[i[2]] = i[0]
  })

  let html = '<h3>倉庫</h3><div class="grid">'

  for(let i=1;i<=30;i++){
    const loc = "A-"+i
    const p = map[loc] || ""

    html += `
    <div class="cell ${p?'used':'empty'}"
         ondragover="allowDrop(event)"
         ondrop="drop('${loc}')">

         <div class="loc">${loc}</div>

         <div draggable="true"
              ondragstart="drag('${p}')"
              class="item">
              ${p || ''}
         </div>
    </div>`
  }

  html += '</div>'

  document.getElementById("app").innerHTML = html
}

function drag(p){
  draggingProduct = p
}

async function drop(loc){
  if(!draggingProduct) return

  await fetch('/api/move',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      p: draggingProduct,
      l: loc
    })
  })

  draggingProduct = null
  renderWarehouse()
}

function allowDrop(e){
  e.preventDefault()
}

// ===== 異動 =====
async function renderActivity(){
  const r=await fetch('/api/activity')
  const j=await r.json()

  document.getElementById("app").innerHTML =
    "<h3>異動紀錄</h3>" +
    j.items.map(x=>`<div>${x.a} ${x.t}</div>`).join("")
}

</script>

</body>
</html>
