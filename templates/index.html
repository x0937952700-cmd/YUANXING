<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>沅興木業</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* ===== 標題 ===== */
.top{
  background:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* ===== 按鈕 ===== */
.btn{
  width:90%;
  margin:10px auto;
  display:block;
  padding:15px;
  font-size:18px;
}

/* ===== 倉庫 ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:10px;
}

.cell{
  height:90px;
  border-radius:10px;
  padding:5px;
  position:relative;
}

.used{
  background:#a5d6a7;
}

.empty{
  background:#eee;
}

.loc{
  font-size:12px;
  position:absolute;
  top:3px;
  left:5px;
}

.item{
  margin-top:20px;
  text-align:center;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="top">沅興木業</div>

<button class="btn" onclick="loadWarehouse()">倉庫</button>

<div id="app"></div>

<script>

let draggingProduct = null

// ===== 每2秒同步 =====
setInterval(loadWarehouse,2000)

// ===== 載入倉庫 =====
async function loadWarehouse(){

  const r = await fetch('/api/w')
  const data = await r.json()

  const map = {}
  data.forEach(i=>{
    map[i[2]] = i[0] // location → product
  })

  let html = '<div class="grid">'

  for(let i=1;i<=30;i++){
    const loc = "A-"+i
    const p = map[loc] || ""

    html += `
    <div class="cell ${p?'used':'empty'}"
         ondragover="allowDrop(event)"
         ondrop="drop('${loc}')">

         <div class="loc">${loc}</div>

         <div draggable="true"
              ondragstart="drag('${p}')"
              class="item">
              ${p || ''}
         </div>
    </div>`
  }

  html += '</div>'

  document.getElementById("app").innerHTML = html
}

// ===== 拖 =====
function drag(p){
  draggingProduct = p
}

// ===== 放 =====
async function drop(loc){

  if(!draggingProduct) return

  await fetch('/api/move',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      p: draggingProduct,
      l: loc
    })
  })

  draggingProduct = null
  loadWarehouse()
}

// ===== 允許拖 =====
function allowDrop(e){
  e.preventDefault()
}

</script>

</body>
</html>
