<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智慧倉庫系統</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">AI OCR 智慧辨識 + 倉庫定位 + 出貨管理</div>
        <h1>智慧倉庫系統</h1>
      </div>
      <div class="userbox">
        <span id="currentUser">未登入</span>
        <button class="ghost-btn" id="logoutBtn">登出</button>
      </div>
    </header>

    <nav class="main-nav">
      <button class="nav-btn active" data-mode="inventory">庫存</button>
      <button class="nav-btn" data-mode="order">訂單</button>
      <button class="nav-btn" data-mode="master">總單</button>
      <button class="nav-btn" data-mode="ship">出貨</button>
      <button class="nav-btn" data-mode="shipping">出貨查詢</button>
      <button class="nav-btn" data-mode="warehouse">倉庫圖</button>
    </nav>

    <section class="hero-card">
      <div class="upload-row">
        <label class="upload-btn">
          <input id="fileInput" type="file" accept="image/*" capture="environment">
          <span>上傳檔案（相簿 / 拍照）</span>
        </label>
        <button class="primary-btn" id="refreshBtn">重新整理</button>
      </div>

      <div class="status-row">
        <div class="status-pill">模式：<span id="modeLabel">庫存</span></div>
        <div class="status-pill">信心值：<span id="confidenceLabel">0</span>%</div>
        <div class="status-pill warn" id="warningBox">尚未辨識</div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>客戶名稱</label>
          <input id="customerInput" type="text" placeholder="請輸入客戶名稱">
        </div>
        <div class="field">
          <label>倉庫格位 / 預設位置</label>
          <input id="locationInput" type="text" placeholder="例如：A後排01">
        </div>
      </div>

      <div class="ocr-wrap">
        <label>OCR 文字框（可直接修改）</label>
        <textarea id="ocrText" placeholder="辨識後文字會出現在這裡，可人工修改"></textarea>
      </div>

      <div class="action-row">
        <button class="primary-btn" id="confirmBtn">確認送出</button>
        <button class="ghost-btn" id="findLocationBtn">反查商品位置</button>
      </div>

      <div id="ocrHint" class="hint">手機拍照或相簿上傳後，OCR 會自動寫入文字框。</div>
    </section>

    <section class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <h2>首頁六大功能</h2>
          <span>白底 / 灰色大按鈕 / 直條排列</span>
        </div>
        <div class="big-menu">
          <button class="big-menu-btn" data-mode="inventory">庫存</button>
          <button class="big-menu-btn" data-mode="order">訂單</button>
          <button class="big-menu-btn" data-mode="master">總單</button>
          <button class="big-menu-btn" data-mode="ship">出貨</button>
          <button class="big-menu-btn" data-mode="shipping">出貨查詢</button>
          <button class="big-menu-btn" data-mode="warehouse">倉庫圖</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>客戶分類</h2>
          <span>點一下帶入客戶名稱</span>
        </div>
        <div id="customerGroups" class="customer-groups"></div>
      </div>
    </section>

    <section class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <h2>倉庫高亮定位</h2>
          <span>OCR 後可自動反查商品所在格位</span>
        </div>
        <div id="warehouseMap" class="warehouse-map"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>庫存 / 總單 / 訂單</h2>
          <span>即時清單</span>
        </div>
        <div class="mini-tabs">
          <button class="mini-tab active" data-list="inventoryList">庫存</button>
          <button class="mini-tab" data-list="masterList">總單</button>
          <button class="mini-tab" data-list="orderList">訂單</button>
        </div>
        <div class="table-wrap">
          <table class="table" id="inventoryTable"></table>
        </div>
      </div>
    </section>

    <section class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <h2>出貨查詢</h2>
          <span>/api/shipping_records</span>
        </div>
        <div class="table-wrap">
          <table class="table" id="shippingTable"></table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>操作紀錄</h2>
          <span>誰、時間、做什麼</span>
        </div>
        <div class="table-wrap">
          <table class="table" id="logsTable"></table>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>自動備份</h2>
        <span>DB 備份 + 圖片備份 + 保留 7 份</span>
      </div>
      <div class="action-row">
        <button class="primary-btn" id="backupBtn">手動備份</button>
        <button class="ghost-btn" id="refreshBackupBtn">重新載入備份清單</button>
      </div>
      <div class="table-wrap">
        <table class="table" id="backupsTable"></table>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
