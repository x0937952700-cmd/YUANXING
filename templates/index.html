<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{font-family:Arial;background:#eee;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;}
.cell{height:50px;background:#fff;border:1px solid #aaa;}
.drag{background:#6fa8dc;color:#fff;}
</style>
</head>

<body>

<h2>沅興木業 最終版</h2>

<input id="ocr">
<button onclick="applyOCR()">OCR修正</button>

<br><br>

<input id="p"><input id="q">
<button onclick="add()">入庫</button>

<h3>倉庫</h3>
<div id="w" class="grid"></div>

<script>

let dragItem=""

function applyOCR(){
 fetch("/api/ocr_apply?t="+ocr.value)
 .then(r=>r.json())
 .then(d=>ocr.value=d.text)
}

function add(){
 fetch("/api/add",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({p:p.value,q:Number(q.value)})})
}

function build(){
 let w=document.getElementById("w")
 w.innerHTML=""

 for(let i=0;i<120;i++){
  let c=document.createElement("div")
  c.className="cell"
  c.dataset.loc="L"+i

  c.ondrop=(e)=>{
    e.preventDefault()
    fetch("/api/move",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({p:dragItem,loc:c.dataset.loc})})
  }

  c.ondragover=(e)=>e.preventDefault()
  w.appendChild(c)
 }
}

function load(){
 fetch("/api/warehouse")
 .then(r=>r.json())
 .then(d=>{
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="")
  d.forEach(i=>{
    if(i.l){
      let cell=[...document.querySelectorAll(".cell")]
      .find(c=>c.dataset.loc===i.l)

      if(cell){
        cell.innerHTML=`<div draggable="true"
        ondragstart="dragItem='${i.p}'"
        class="drag">${i.p}<br>${i.q}</div>`
      }
    }
  })
 })
}

setInterval(load,2000)
build()

</script>

</body>
</html>
