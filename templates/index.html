<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>沅興木業</title>

<!-- 🔥 防 HTML 快取（關鍵） -->
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== 標題 ===== */
.title{
    margin-top:40px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

/* ===== 容器 ===== */
.menu{
    margin-top:30px;
    width:100%;
    max-width:400px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== 按鈕 ===== */
.menu-btn{
    width:85%;
    padding:20px;
    margin:12px 0;
    border:none;
    border-radius:20px;
    font-size:22px;
    background:#f2f2f2;
    color:#333;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.2s;
}

.menu-btn:active{
    transform:scale(0.96);
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="title">沅興木業</div>

<div class="menu">
    <button class="menu-btn" onclick="goPage('inventory')">庫存</button>
    <button class="menu-btn" onclick="goPage('orders')">訂單</button>
    <button class="menu-btn" onclick="goPage('master_order')">總單</button>
    <button class="menu-btn" onclick="goPage('ship')">出貨</button>
    <button class="menu-btn" onclick="goPage('warehouse')">倉庫圖</button>
    <button class="menu-btn" onclick="goPage('customers')">客戶資料</button>
</div>

<div id="app"></div>

<script>
// ===== 導頁 =====
function goPage(page){
    document.getElementById('app').dataset.module = page;
    location.hash = page;
    initPage();
}

// ===== 初始化 =====
function initPage(){
    const root=document.getElementById('app');
    const m=root.dataset.module;

    if(m==='inventory') renderInventory();
    if(m==='orders') renderOrders();
    if(m==='master_order') renderMasterOrders();
    if(m==='ship') renderShip();
    if(m==='warehouse') renderWarehouse();
    if(m==='customers') renderCustomers();
    if(m==='activity') renderActivity();
}

// ===== Service Worker（安全版）=====
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/service-worker.js")
      .then(() => console.log("PWA安全模式啟用"))
      .catch(()=>{});
  });
}

// ===== UI工具 =====
function card(html){return `<div class="card">${html}</div>`}

// ===== API功能 =====
async function renderInventory(){
 const r=await fetch('/api/inventory'); 
 const j=await r.json(); 
 const items=j.items||[];

 document.getElementById('app').innerHTML=card(`
 <h3>庫存</h3>
 ${items.map(x=>`
 <div>
 <b>${x.product_text}</b> ${x.qty}
 </div>`).join('')}
 `);
}

async function renderOrders(){
 const r=await fetch('/api/orders');
 const j=await r.json();
 document.getElementById('app').innerHTML=card(`<h3>訂單</h3>`);
}

async function renderMasterOrders(){
 const r=await fetch('/api/master_orders');
 const j=await r.json();
 document.getElementById('app').innerHTML=card(`<h3>總單</h3>`);
}

async function renderShip(){
 document.getElementById('app').innerHTML=card(`<h3>出貨</h3>`);
}

async function renderCustomers(){
 const r=await fetch('/api/customers');
 const j=await r.json();
 document.getElementById('app').innerHTML=card(`<h3>客戶資料</h3>`);
}

async function renderWarehouse(){
 const r=await fetch('/api/warehouse');
 const j=await r.json();
 const cells=j.cells||[];

 document.getElementById('app').innerHTML=card(`
 <h3>倉庫圖</h3>
 ${cells.map(c=>`
 <div>${c.zone}${c.column_index}-${c.slot_number}</div>
 `).join('')}
 `);
}

</script>

</body>
</html>
