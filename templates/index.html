
<h2>白板OCR 90%版</h2>

<input type="file" id="img">
<button onclick="send()">辨識</button>

<div id="conf"></div>
<form method="post" action="/add">
<textarea name="text" id="txt"></textarea>
<button>加入庫存</button>
</form>

<ul>
{% for i in data %}
<li>{{i}}</li>
{% endfor %}
</ul>

<script>
function send(){
 let f=document.getElementById("img").files[0]
 let form=new FormData()
 form.append("image",f)

 fetch("/upload",{method:"POST",body:form})
 .then(r=>r.json())
 .then(d=>{
  document.getElementById("txt").value=d.text
  let c=d.confidence||0
  let color=c>0.8?"green":(c>0.5?"orange":"red")
  document.getElementById("conf").innerHTML=
   `<b style="color:${color}">信心:${c}</b>`
 })
}
</script>
