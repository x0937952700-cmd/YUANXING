<!DOCTYPE html>
<html>
<body>

<h2>沅興木業</h2>

<button onclick="inv()">庫存</button>
<button onclick="order()">訂單</button>
<button onclick="ship()">出貨</button>
<button onclick="query()">出貨查詢</button>
<button onclick="wh()">倉庫</button>
<button onclick="cus()">客戶</button>
<button onclick="act()">異動</button>

<div id="app"></div>

<script>
function inv(){fetch('/api/inventory').then(r=>r.json()).then(j=>{
app.innerHTML=j.items.map(x=>x.p+"-"+x.q).join("<br>")
})}

function order(){app.innerHTML=`<input id=p><input id=q>
<button onclick="send()">送</button>`}

function send(){
fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({p:p.value,q:+q.value})})
}

function ship(){app.innerHTML=`<input id=sp><input id=sq>
<button onclick="go()">出</button>`}

function go(){
fetch('/api/ship',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({p:sp.value,q:+sq.value})})
}

function query(){fetch('/api/orders').then(r=>r.json()).then(j=>{
app.innerHTML=j.items.map(x=>x.product).join("<br>")
})}

function wh(){fetch('/api/w').then(r=>r.json()).then(j=>{
app.innerHTML=j.map(x=>x[0]+"-"+x[1]).join("<br>")
})}

function cus(){fetch('/api/customers').then(r=>r.json()).then(j=>{
app.innerHTML=j.items.map(x=>x.name).join("<br>")
})}

function act(){fetch('/api/activity').then(r=>r.json()).then(j=>{
app.innerHTML=j.items.map(x=>x.action).join("<br>")
})}
</script>

</body>
</html>
