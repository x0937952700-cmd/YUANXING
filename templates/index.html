<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>沅興木業</title>

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== 標題 ===== */
.title{
    margin-top:40px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

/* ===== 容器 ===== */
.menu{
    margin-top:30px;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== 按鈕 ===== */
.menu-btn{
    width:90%;
    padding:20px;
    margin:12px 0;
    border:none;
    border-radius:20px;
    font-size:22px;
    background:#f2f2f2;
    color:#333;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.2s;
}

.menu-btn:active{
    transform:scale(0.96);
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- ===== 標題（置中） ===== -->
<div class="title">沅興木業</div>

<!-- ===== 主選單 ===== -->
<div class="menu">

    <button class="menu-btn" onclick="goPage('inventory')">庫存</button>

    <button class="menu-btn" onclick="goPage('orders')">訂單</button>

    <button class="menu-btn" onclick="goPage('master')">總單</button>

    <button class="menu-btn" onclick="goPage('ship')">出貨</button>

    <button class="menu-btn" onclick="goPage('warehouse')">倉庫圖</button>

    <button class="menu-btn" onclick="goPage('customers')">客戶資料</button>

</div>

<script>
function goPage(page){
    alert("準備進入：" + page + "（之後我可以幫你接完整系統）");
}
</script>

</body>
</html>
