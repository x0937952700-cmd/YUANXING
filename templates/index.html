<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>沅興木業</title>

<!-- 🔥 永不快取 -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.title{
    margin-top:40px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

.menu{
    margin-top:30px;
    width:100%;
    max-width:400px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.menu-btn{
    width:85%;
    padding:20px;
    margin:12px 0;
    border:none;
    border-radius:20px;
    font-size:22px;
    background:#f2f2f2;
    color:#333;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.2s;
}

.menu-btn:active{
    transform:scale(0.96);
}
</style>
</head>

<body>

<div class="title">沅興木業</div>

<div class="menu">
    <button class="menu-btn" onclick="go('inventory')">庫存</button>
    <button class="menu-btn" onclick="go('orders')">訂單</button>
    <button class="menu-btn" onclick="go('master_order')">總單</button>
    <button class="menu-btn" onclick="go('ship')">出貨</button>
    <button class="menu-btn" onclick="go('warehouse')">倉庫圖</button>
    <button class="menu-btn" onclick="go('customers')">客戶資料</button>
</div>

<div id="app"></div>

<script>
// 🔥 強制更新 SW（重點）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });

  navigator.serviceWorker.register('/static/service-worker.js?v=' + Date.now());
}

// 導頁
function go(p){
  document.getElementById('app').innerHTML = "<h3>"+p+"</h3>";
}
</script>

</body>
</html>
