<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{font-family:Arial;background:#e9e6e1;text-align:center;}
.title{font-size:28px;margin:20px;}
.page{display:none;}
.active{display:block;}
button{padding:20px;margin:10px;width:85%;border-radius:12px;}
</style>
</head>

<body>

<div class="title">沅興木業</div>

<div id="login" class="page active">
<input id="u" placeholder="姓名"><br>
<input id="p" placeholder="密碼"><br>
<button onclick="login()">登入</button>
</div>

<div id="home" class="page">
<button onclick="go('stock')">庫存</button>
<button onclick="go('ship')">出貨</button>
<button onclick="go('warehouse')">倉庫圖</button>
<button onclick="go('logs')">紀錄</button>
</div>

<div id="stock" class="page">
<button onclick="go('home')">返回</button>
<input id="p1" placeholder="商品">
<input id="q1" placeholder="數量">
<input id="c1" placeholder="客戶">
<button onclick="add()">入庫</button>
</div>

<div id="ship" class="page">
<button onclick="go('home')">返回</button>
<input id="p2" placeholder="商品">
<input id="q2" placeholder="數量">
<button onclick="ship()">出貨</button>
</div>

<div id="warehouse" class="page">
<button onclick="go('home')">返回</button>
<div id="w"></div>
</div>

<div id="logs" class="page">
<button onclick="go('home')">返回</button>
<ul id="l"></ul>
</div>

<script>
let user="";

function login(){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({u:u.value,p:p.value})
 })
 .then(r=>r.json())
 .then(d=>{
  if(d.error){alert(d.error);return}
  user=u.value
  go('home')
 })
}

function go(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
 if(id==="warehouse") loadW()
 if(id==="logs") loadLogs()
}

function add(){
 fetch("/api/add",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({p:p1.value,q:q1.value,c:c1.value,user:user})
 })
}

function ship(){
 fetch("/api/ship",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({p:p2.value,q:q2.value,user:user})
 })
}

function loadW(){
 fetch("/api/warehouse")
 .then(r=>r.json())
 .then(d=>{
  w.innerHTML=JSON.stringify(d)
 })
}

function loadLogs(){
 fetch("/api/logs")
 .then(r=>r.json())
 .then(d=>{
  l.innerHTML=d.map(i=>`<li>${i.u}:${i.a}</li>`).join("")
 })
}
</script>

</body>
</html>
