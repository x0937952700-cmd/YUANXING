<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{font-family:Arial;text-align:center;background:#eee;}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;}
.cell{height:60px;background:#fff;border:1px solid #aaa;}
.drag{background:#6fa8dc;color:#fff;}
</style>
</head>

<body>

<h2>沅興木業 最終版</h2>

<input id="ocr">
<button onclick="apply()">OCR修正</button>

<br><br>

<input id="p"><input id="q">
<button onclick="add()">入庫</button>

<h3>倉庫</h3>
<div id="w" class="grid"></div>

<script>
let drag=""

function apply(){
 fetch("/api/ocr_apply?t="+ocr.value)
 .then(r=>r.json())
 .then(d=>ocr.value=d.t)
}

function add(){
 fetch("/api/add",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({p:p.value,q:Number(q.value)})})
}

function build(){
 let w=document.getElementById("w")
 w.innerHTML=""

 for(let i=0;i<120;i++){
  let c=document.createElement("div")
  c.className="cell"
  c.dataset.l="L"+i

  c.ondrop=(e)=>{
    e.preventDefault()
    fetch("/api/move",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({p:drag,l:c.dataset.l})})
  }

  c.ondragover=(e)=>e.preventDefault()
  w.appendChild(c)
 }
}

function load(){
 fetch("/api/w")
 .then(r=>r.json())
 .then(d=>{
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="")
  d.forEach(i=>{
    if(i[2]){
      let cell=[...document.querySelectorAll(".cell")]
      .find(c=>c.dataset.l===i[2])

      if(cell){
        cell.innerHTML=`<div draggable="true"
        ondragstart="drag='${i[0]}'"
        class="drag">${i[0]}<br>${i[1]}</div>`
      }
    }
  })
 })
}

setInterval(load,2000)
build()
</script>

</body>
</html>
