<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>設定</title><link rel="stylesheet" href="/static/styles.css"></head><body><div class="page"><h2>設定</h2><div class="card"><input id="old_password" type="password" placeholder="舊密碼"><input id="new_password" type="password" placeholder="新密碼"><input id="confirm_password" type="password" placeholder="確認新密碼"><button onclick="changePassword()">修改密碼</button><p id="msg"></p></div><a class="small-btn" href="/">回首頁</a></div><script>async function changePassword(){const r=await fetch('/api/change_password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:old_password.value,new_password:new_password.value,confirm_password:confirm_password.value})});const j=await r.json();msg.textContent=j.success?'修改成功':(j.error||'修改失敗');}</script></body></html>
