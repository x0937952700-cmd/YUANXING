<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>沅興木業</title>

<style>
body{
    margin:0;
    background:#e9e6e1;
    font-family:Arial;
}

/* ===== 頂部 ===== */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
    font-size:14px;
}

.center-bar{
    text-align:center;
    margin-top:10px;
}

.top-btn{
    padding:8px 14px;
    margin:0 5px;
    border:none;
    border-radius:10px;
    background:#3b2d23;
    color:#fff;
}

/* ===== 共用頁 ===== */
.page{
    display:none;
}

.active{
    display:block;
}

/* ===== 首頁 ===== */
.home{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* 標題 */
.title{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

/* 按鈕區 */
.menu{
    margin-top:30px;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.menu-btn{
    width:90%;
    padding:20px;
    margin:12px 0;
    border:none;
    border-radius:20px;
    font-size:22px;
    background:#f2f2f2;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.menu-btn:active{
    transform:scale(0.96);
}

/* ===== 倉庫圖 ===== */
#warehouse{
    padding:10px;
}

.zone{
    margin-bottom:30px;
}

.zone-title{
    font-size:20px;
    font-weight:bold;
}

.column{
    display:inline-block;
    margin:4px;
    background:#eee;
    border-radius:10px;
    padding:5px;
}

.row{
    display:flex;
}

.cell{
    width:26px;
    height:26px;
    margin:2px;
    font-size:10px;
    text-align:center;
    line-height:26px;
    background:#ddd;
    border-radius:4px;
}

.cell.filled{
    background:#6fa8dc;
    color:#fff;
}

.cell.highlight{
    background:red !important;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1}
    50%{opacity:0.3}
    100%{opacity:1}
}

/* 返回 */
.back{
    margin:10px;
    padding:10px 20px;
}
</style>
</head>

<body>

<!-- ===== 頂部 ===== -->
<div class="topbar">
    <div>登入：陳韋廷</div>
    <div>2026-04-18</div>
</div>

<div class="center-bar">
    <button class="top-btn">設定</button>
    <button class="top-btn">今日異動</button>
    <button class="top-btn">登出</button>
    <div style="margin-top:5px;">陳韋廷</div>
</div>

<!-- ===== 首頁 ===== -->
<div id="homePage" class="page active home">

    <div class="title">沅興木業</div>

    <div class="menu">
        <button class="menu-btn">庫存</button>
        <button class="menu-btn">訂單</button>
        <button class="menu-btn">總單</button>
        <button class="menu-btn">出貨</button>
        <button class="menu-btn" onclick="goPage('warehousePage')">倉庫圖</button>
        <button class="menu-btn">客戶資料</button>
    </div>

</div>

<!-- ===== 倉庫圖頁 ===== -->
<div id="warehousePage" class="page">

<button class="back" onclick="goPage('homePage')">← 返回</button>

<h2 style="text-align:center;">倉庫圖</h2>

<input 
    placeholder="搜尋商品..."
    style="width:90%;padding:12px;margin:10px;border-radius:10px;"
    oninput="searchItem(this.value)"
>

<div id="warehouse"></div>

</div>

<script>

/* ===== 切頁 ===== */
function goPage(id){
    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

/* ===== 倉庫圖 ===== */
let warehouseData = {};

function buildWarehouse(){
    let container = document.getElementById("warehouse");
    container.innerHTML = "";

    ["A","B"].forEach(zone=>{
        let zoneDiv = document.createElement("div");
        zoneDiv.className = "zone";
        zoneDiv.innerHTML = `<div class="zone-title">${zone}區</div>`;

        for(let col=1; col<=12; col++){

            let colDiv = document.createElement("div");
            colDiv.className = "column";

            let back = document.createElement("div");
            back.className = "row";

            for(let i=1;i<=10;i++){
                back.appendChild(createCell(`${zone}-B-${col}-${i}`));
            }

            let front = document.createElement("div");
            front.className = "row";

            for(let i=1;i<=10;i++){
                front.appendChild(createCell(`${zone}-F-${col}-${i}`));
            }

            colDiv.appendChild(back);
            colDiv.appendChild(front);
            zoneDiv.appendChild(colDiv);
        }

        container.appendChild(zoneDiv);
    });
}

function createCell(id){
    let c = document.createElement("div");
    c.className = "cell";
    c.id = id;
    c.innerText = id.split("-")[3];

    c.onclick = ()=>{
        let d = warehouseData[id];
        if(d){
            alert(`客戶:${d.customer}\n商品:${d.product}\n數量:${d.qty}`);
        }
    };

    return c;
}

async function loadWarehouse(){
    let res = await fetch("/api/warehouse");
    let data = await res.json();

    warehouseData = {};

    document.querySelectorAll(".cell").forEach(c=>{
        c.classList.remove("filled","highlight");
    });

    data.forEach(i=>{
        let cell = document.getElementById(i.location);
        if(cell){
            cell.classList.add("filled");
            cell.innerText = i.qty;
            warehouseData[i.location] = i;
        }
    });
}

async function searchItem(k){
    if(!k) return;

    let res = await fetch("/api/search?kw="+k);
    let data = await res.json();

    document.querySelectorAll(".cell").forEach(c=>{
        c.classList.remove("highlight");
    });

    data.forEach(i=>{
        let cell = document.getElementById(i.location);
        if(cell){
            cell.classList.add("highlight");
            cell.scrollIntoView({behavior:"smooth",block:"center"});
        }
    });
}

buildWarehouse();
loadWarehouse();

setInterval(()=>{
    if(document.getElementById("warehousePage").classList.contains("active")){
        loadWarehouse();
    }
},3000);

</script>

</body>
</html>
