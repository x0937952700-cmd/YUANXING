services:
  - type: web
    name: warehouse-system
    runtime: python
    plan: free
    branch: main

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --workers 1 --threads 4

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: AUTO_BACKUP_ENABLED
        value: "1"

      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString

databases:
  - name: warehouse-db
    plan: free
